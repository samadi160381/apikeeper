<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Keys — Apikeeper</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh; padding:20px;
  }
  .wrap { max-width:900px; margin:0 auto; }
  .card { background:#fff; border-radius:12px; padding:30px; margin-bottom:20px; box-shadow:0 4px 6px rgba(0,0,0,.1);}
  h1 { font-size:26px; color:#1f2937; }
  .row { display:flex; justify-content:space-between; align-items:center; }
  input, textarea {
    width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px;
    font-size:14px; margin-top:6px; margin-bottom:16px; font-family:inherit;
  }
  label { font-size:13px; font-weight:600; color:#374151; }
  button {
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff; border:none; padding:10px 18px; border-radius:8px;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  button.logout { background:#ef4444; }
  button.delete { background:#ef4444; padding:6px 12px; font-size:12px; }
  .key-item {
    background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px;
    padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;
  }
  .key-value { font-family:monospace; font-size:13px; }
  .meta { font-size:12px; color:#9ca3af; margin-top:4px;}
  .msg { padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; }
  .success { background:#d1fae5; color:#065f46; }
  .error { background:#fee2e2; color:#7f1d1d; }
  #authBox { max-width:400px; margin:60px auto; }
  #app { display:none; }
</style>
</head>
<body>

<div id="authBox" class="card">
  <h1>Apikeeper</h1>
  <p style="color:#6b7280;margin:10px 0 20px;">Enter your admin token to manage API keys</p>
  <label>Admin Token</label>
  <input type="password" id="adminToken" placeholder="Enter admin token">
  <button onclick="login()" style="width:100%;">Sign In</button>
  <div id="authMsg"></div>
</div>

<div id="app" class="wrap">
  <div class="card row">
    <h1>API Keys</h1>
    <div>
      <button onclick="logout()" class="logout">Logout</button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:16px;">Create New Key</h2>
    <div id="createMsg"></div>
    <label>Description (optional)</label>
    <input type="text" id="desc" placeholder="e.g. Foteballe app">
    <button onclick="createKey()">Generate Key</button>
  </div>

  <div class="card">
    <h2 style="margin-bottom:16px;">Your Keys</h2>
    <div id="keysList">Loading...</div>
  </div>
</div>

<script>
  let token = '';

  function login() {
    token = document.getElementById('adminToken').value.trim();
    if (!token) { alert('Enter a token'); return; }
    document.getElementById('authBox').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadKeys();
  }

  function logout() {
    token = '';
    document.getElementById('authBox').style.display = 'block';
    document.getElementById('app').style.display = 'none';
    document.getElementById('adminToken').value = '';
  }

  async function loadKeys() {
    const el = document.getElementById('keysList');
    el.textContent = 'Loading...';
    try {
      const res = await fetch('/api/keys', {
        headers: { 'X-Admin-Token': token }
      });
      if (!res.ok) {
        el.innerHTML = `<div class="msg error">Error ${res.status}: could not load keys. Check your token.</div>`;
        return;
      }
      const data = await res.json();
      if (!data.keys || data.keys.length === 0) {
        el.innerHTML = '<p style="color:#9ca3af;">No keys yet.</p>';
        return;
      }
      el.innerHTML = data.keys.map(k => `
        <div class="key-item">
          <div>
            <div class="key-value">${k.key}</div>
            <div class="meta">${k.description || 'No description'} · ${new Date(k.created_at).toLocaleDateString()}</div>
          </div>
          <button class="delete" onclick="deleteKey(${k.id})">Delete</button>
        </div>
      `).join('');
    } catch (err) {
      el.innerHTML = `<div class="msg error">Network error: ${err.message}</div>`;
    }
  }

  async function createKey() {
    const desc = document.getElementById('desc').value.trim();
    const msg = document.getElementById('createMsg');
    msg.innerHTML = '';
    try {
      const res = await fetch('/api/keys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
        body: JSON.stringify({ description: desc || null })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        msg.innerHTML = `<div class="msg error">Error: ${err.error || res.status}</div>`;
        return;
      }
      const data = await res.json();
      msg.innerHTML = `<div class="msg success">Key created! Copy it now:<br><code style="word-break:break-all;">${data.key}</code></div>`;
      document.getElementById('desc').value = '';
      loadKeys();
    } catch (err) {
      msg.innerHTML = `<div class="msg error">Network error: ${err.message}</div>`;
    }
  }

  async function deleteKey(id) {
    if (!confirm('Delete this key?')) return;
    try {
      const res = await fetch('/api/keys/' + id, {
        method: 'DELETE',
        headers: { 'X-Admin-Token': token }
      });
      if (res.ok) loadKeys();
      else alert('Failed to delete');
    } catch (err) {
      alert('Network error: ' + err.message);
    }
  }
</script>
</body>
</html>
